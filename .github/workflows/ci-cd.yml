name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-passenger:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/passenger-web
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./apps/passenger-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint || echo "No lint script"
      - name: Run tests
        run: npm test || echo "No tests"
      - name: Build
        run: npm run build

  test-driver:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/driver-web
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./apps/driver-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint || echo "No lint script"
      - name: Run tests
        run: npm test || echo "No tests"
      - name: Build
        run: npm run build

  test-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/admin-dashboard
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./apps/admin-dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint || echo "No lint script"
      - name: Run tests
        run: npm test || echo "No tests"
      - name: Build
        run: npm run build

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taxilibre_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test || echo "No tests"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taxilibre_test
          NODE_ENV: test

  deploy-passenger:
    needs: [test-passenger]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Vercel (Passenger)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PASSENGER }}
          working-directory: ./apps/passenger-web

  deploy-driver:
    needs: [test-driver]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Vercel (Driver)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_DRIVER }}
          working-directory: ./apps/driver-web

  deploy-admin:
    needs: [test-admin]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Vercel (Admin)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          working-directory: ./apps/admin-dashboard

# 📊 CI/CD PIPELINE

## .github/workflows/deploy-production.yml

name: Deploy TaxiLibre to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-3
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taxilibre_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        cd backend && npm ci
        cd ../apps/passenger-web && npm ci
        cd ../driver-web && npm ci
        cd ../admin-dashboard && npm ci

    - name: Run backend tests
      run: |
        cd backend
        npm run test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taxilibre_test
        REDIS_URL: redis://localhost:6379

    - name: Run frontend tests
      run: |
        cd apps/passenger-web && npm run test -- --watchAll=false
        cd ../driver-web && npm run test -- --watchAll=false
        cd ../admin-dashboard && npm run test -- --watchAll=false

    - name: Build frontend applications
      run: |
        cd apps/passenger-web && npm run build
        cd ../driver-web && npm run build
        cd ../admin-dashboard && npm run build

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push backend image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: taxilibre-backend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f backend/Dockerfile ./backend
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Build, tag, and push frontend images
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Passenger Web
        docker build -t $ECR_REGISTRY/taxilibre-passenger-web:$IMAGE_TAG -f apps/passenger-web/Dockerfile ./apps/passenger-web
        docker tag $ECR_REGISTRY/taxilibre-passenger-web:$IMAGE_TAG $ECR_REGISTRY/taxilibre-passenger-web:latest
        docker push $ECR_REGISTRY/taxilibre-passenger-web:$IMAGE_TAG
        docker push $ECR_REGISTRY/taxilibre-passenger-web:latest
        
        # Driver Web
        docker build -t $ECR_REGISTRY/taxilibre-driver-web:$IMAGE_TAG -f apps/driver-web/Dockerfile ./apps/driver-web
        docker tag $ECR_REGISTRY/taxilibre-driver-web:$IMAGE_TAG $ECR_REGISTRY/taxilibre-driver-web:latest
        docker push $ECR_REGISTRY/taxilibre-driver-web:$IMAGE_TAG
        docker push $ECR_REGISTRY/taxilibre-driver-web:latest
        
        # Admin Dashboard
        docker build -t $ECR_REGISTRY/taxilibre-admin-dashboard:$IMAGE_TAG -f apps/admin-dashboard/Dockerfile ./apps/admin-dashboard
        docker tag $ECR_REGISTRY/taxilibre-admin-dashboard:$IMAGE_TAG $ECR_REGISTRY/taxilibre-admin-dashboard:latest
        docker push $ECR_REGISTRY/taxilibre-admin-dashboard:$IMAGE_TAG
        docker push $ECR_REGISTRY/taxilibre-admin-dashboard:latest

    - name: Deploy to ECS
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Update backend service
        aws ecs update-service \
          --cluster taxilibre \
          --service taxilibre-backend \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}
        
        # Update frontend services
        aws ecs update-service \
          --cluster taxilibre \
          --service taxilibre-passenger-web \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}
          
        aws ecs update-service \
          --cluster taxilibre \
          --service taxilibre-driver-web \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}
          
        aws ecs update-service \
          --cluster taxilibre \
          --service taxilibre-admin-dashboard \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}

    - name: Wait for services to stabilize
      run: |
        aws ecs wait services-stable \
          --cluster taxilibre \
          --services taxilibre-backend taxilibre-passenger-web taxilibre-driver-web taxilibre-admin-dashboard \
          --region ${{ env.AWS_REGION }}

    - name: Run smoke tests
      run: |
        # Wait for services to be ready
        sleep 60
        
        # Test API health
        curl -f https://api.taxilibre.com/health || exit 1
        
        # Test frontend health
        curl -f https://taxilibre.com || exit 1
        curl -f https://taxilibre.com/driver/ || exit 1
        curl -f https://taxilibre.com/admin/ || exit 1
        
        echo "✅ All smoke tests passed!"

    - name: Notify deployment success
      if: success()
      run: |
        curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 TaxiLibre deployed successfully! 🌐 https://taxilibre.com"

    - name: Notify deployment failure
      if: failure()
      run: |
        curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=❌ TaxiLibre deployment failed! Check GitHub Actions for details."
